server.port=9090

# MCP over HTTP for Cursor "url" / Streamable HTTP (and SSE fallback)
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.protocol=STREAMABLE
# Cursor streamable client POSTs to the configured URL path; with "url": "http://localhost:9090" that is /. Spring AI default is /mcp.
spring.ai.mcp.server.streamable-http.mcp-endpoint=/

spring.main.banner-mode=off

logging.pattern.console=
